# warehouse_map.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Metadata for the pre-built warehouse occupancy map.
# Used by nav2_map_server when running in localisation mode (slam:=false).
#
# This file was generated by:
#   ros2 run nav2_map_server map_saver_cli -f warehouse_map
# after driving the robot through the warehouse with SLAM Toolbox active.
#
# To use this map:
#   ros2 launch warehouse_amr sim.launch.py slam:=false
# ─────────────────────────────────────────────────────────────────────────────

image: warehouse_map.pgm   # grayscale PGM image file in the same directory;
                            # each pixel represents one map cell (resolution × resolution metres)

mode: trinary              # pixel interpretation mode:
                            #   trinary = three states: free, occupied, unknown
                            #   (dark pixels = occupied walls, light = free space, mid = unknown)

resolution: 0.050          # each pixel covers a 0.05 m × 0.05 m (5 cm × 5 cm) area of the warehouse

origin: [-14.528, -5.250, 0]  # real-world (x, y, yaw) of the bottom-left corner of the PGM image
                               # in metres; set automatically by map_saver when SLAM was running

negate: 0                  # 0 = standard: dark (low value) pixels are obstacles,
                            #               light (high value) pixels are free space

occupied_thresh: 0.65      # pixels with occupancy probability > 0.65 are marked as OCCUPIED (walls)
free_thresh: 0.196         # pixels with occupancy probability < 0.196 are marked as FREE (drivable)
                            # pixels between free_thresh and occupied_thresh are UNKNOWN